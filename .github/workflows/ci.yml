name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (zero warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test

  node:
    name: Node.js (build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build and test
        run: npm run test:cli

  smoke:
    name: End-to-end smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build core binary
        run: cargo build --release
      - name: Build CLI
        run: |
          npm install
          npm run build:cli
      - name: Scan this repository
        run: node packages/dep-lens/dist/cli.js --json --path . --fail-on gpl
      - name: Verify fixture project classification
        run: python3 scripts/verify-fixture.py
